[package]
name = "ap-tools"
version = "0.1.0"
edition = "2024"

[features]
default = ["windows"]
windows = ["ap-controller/windows"]

[[bin]]
name = "screenshot-crop"
path = "src/screenshot_crop.rs"

[dependencies]
ap-controller.workspace = true
image = { workspace = true, features = ["png", "jpeg"] }
anyhow.workspace = true
eframe = "0.33"
egui_extras = { version = "0.33", features = ["image"] }
rfd = "0.17"
